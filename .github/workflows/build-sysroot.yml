name: Build sysroot

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example glibc-2.28-gcc-10.5.0
        required: false
        default: glibc-2.28-gcc-10.5.0
        type: string
      profile_set:
        description: Which sysroot profile set to build
        required: false
        default: default
        type: choice
        options:
          - default
          - arm64-kernel-4.18
      force_rebuild:
        description: Rebuild even if this repository already has a matching release
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-sysroot.yml
      - scripts/build-sysroot.sh
      - third_party/vscode-linux-build-agent/**

permissions:
  contents: write

concurrency:
  group: sysroot-${{ github.event.inputs.release_tag || 'glibc-2.28-gcc-10.5.0' }}
  cancel-in-progress: false

env:
  DEFAULT_RELEASE_TAG: glibc-2.28-gcc-10.5.0
  DEFAULT_PROFILE_SET: default

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      profile_set: ${{ steps.detect.outputs.profile_set }}
    steps:
      - name: Resolve release tag
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_PROFILE_SET: ${{ github.event.inputs.profile_set }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_RELEASE_TAG: ${{ env.DEFAULT_RELEASE_TAG }}
          DEFAULT_PROFILE_SET: ${{ env.DEFAULT_PROFILE_SET }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${INPUT_RELEASE_TAG}" ]; then
            release_tag="${INPUT_RELEASE_TAG}"
          else
            release_tag="${DEFAULT_RELEASE_TAG}"
          fi

          if [ -n "${INPUT_PROFILE_SET}" ]; then
            profile_set="${INPUT_PROFILE_SET}"
          else
            profile_set="${DEFAULT_PROFILE_SET}"
          fi

          if [ "${FORCE_REBUILD}" = "true" ]; then
            should_build=true
          elif gh release view "$release_tag" -R "$REPOSITORY" >/dev/null 2>&1; then
            should_build=false
          else
            should_build=true
          fi

          {
            echo "release_tag=$release_tag"
            echo "profile_set=$profile_set"
            echo "should_build=$should_build"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.profile_set == 'arm64-kernel-4.18' && '[{"profile":"arm64-glibc-2.28-gcc-8.5.0-kernel-4.18.0","asset":"aarch64-linux-gnu-glibc-2.28-gcc-8.5.0-kernel-4.18.0.tar.gz"}]' || '[{"profile":"x64-glibc-2.28-gcc-10.5.0","asset":"x86_64-linux-gnu-glibc-2.28-gcc-10.5.0.tar.gz"},{"profile":"arm64-glibc-2.28-gcc-10.5.0","asset":"aarch64-linux-gnu-glibc-2.28-gcc-10.5.0.tar.gz"}]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          log_dir="${{ github.workspace }}/.work/${{ matrix.profile }}/logs"
          log_file="$log_dir/apt-install.log"
          mkdir -p "$log_dir"

          echo "Installing build dependencies"
          {
            echo "# Install build dependencies"
            echo "Started: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo
            sudo apt-get update
            sudo apt-get install -y \
              autoconf \
              automake \
              bison \
              binutils \
              bzip2 \
              ca-certificates \
              curl \
              file \
              flex \
              g++ \
              gawk \
              gcc \
              gperf \
              gpgv \
              help2man \
              libncurses-dev \
              libtool \
              libtool-bin \
              make \
              meson \
              ninja-build \
              patch \
              python3-dev \
              rsync \
              texinfo \
              unzip \
              wget \
              xz-utils
          } >>"$log_file" 2>&1 || {
            echo "Dependency installation failed. Full log: $log_file"
            echo "::group::Last 200 lines of apt-install.log"
            tail -n 200 "$log_file"
            echo "::endgroup::"
            exit 1
          }

          {
            echo "## ${{ matrix.profile }}"
            echo "- Install build dependencies: success"
            echo "- Dependency log: \`$log_file\`"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Build sysroot
        env:
          WORK_DIR: ${{ github.workspace }}/.work/${{ matrix.profile }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-sysroot.sh
          scripts/build-sysroot.sh "${{ matrix.profile }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: .work/${{ matrix.profile }}/dist/${{ matrix.asset }}
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.profile }}
          path: .work/${{ matrix.profile }}/logs
          if-no-files-found: ignore

  release:
    needs:
      - detect
      - build
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find release-assets -type f -name '*.tar.gz' -exec cp {} dist/ \;
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Delete existing release before force rebuild
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebuild == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete "${{ needs.detect.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --cleanup-tag \
            --yes || true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          name: Sysroot ${{ needs.detect.outputs.release_tag }}
          generate_release_notes: false
          make_latest: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          body: |
            Fixed sysroot release for the older-glibc Remote-SSH workaround described in `vscode-remote-faq.md`.

            This release is not tied to a specific VS Code version. It packages one selected sysroot profile set.

            Profile set:
            - `${{ needs.detect.outputs.profile_set }}`

            Included assets:
            - Uploaded artifacts from this workflow run
            - `SHA256SUMS`

            Remote host prerequisites:
            - `patchelf >= 0.18`
            - `VSCODE_SERVER_CUSTOM_GLIBC_LINKER`
            - `VSCODE_SERVER_CUSTOM_GLIBC_PATH`
            - `VSCODE_SERVER_PATCHELF_PATH`
