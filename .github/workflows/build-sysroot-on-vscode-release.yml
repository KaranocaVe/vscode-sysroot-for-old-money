name: Build sysroot on VS Code release

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      vscode_version:
        description: VS Code stable version to build, for example 1.121.0
        required: false
        type: string
      force_rebuild:
        description: Rebuild even if this repository already has a matching release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sysroot-${{ github.event.inputs.vscode_version || 'latest' }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      vscode_version: ${{ steps.detect.outputs.vscode_version }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - name: Resolve target VS Code version
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event.inputs.vscode_version }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION}"
          else
            version="$(gh api repos/microsoft/vscode/releases/latest --jq '.tag_name')"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unexpected VS Code version: $version" >&2
            exit 1
          fi

          release_tag="vscode-${version}"

          if [ "${FORCE_REBUILD}" = "true" ]; then
            should_build=true
          elif gh release view "$release_tag" -R "$REPOSITORY" >/dev/null 2>&1; then
            should_build=false
          else
            should_build=true
          fi

          {
            echo "vscode_version=$version"
            echo "release_tag=$release_tag"
            echo "should_build=$should_build"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x64
            asset: x86_64-linux-gnu-glibc-2.28-gcc-10.5.0.tar.gz
          - target: arm64
            asset: aarch64-linux-gnu-glibc-2.28-gcc-10.5.0.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            binutils \
            bzip2 \
            ca-certificates \
            curl \
            file \
            flex \
            g++ \
            gawk \
            gcc \
            gperf \
            gpgv \
            help2man \
            libncurses-dev \
            libtool \
            libtool-bin \
            make \
            meson \
            ninja-build \
            patch \
            python3-dev \
            rsync \
            texinfo \
            unzip \
            wget \
            xz-utils

      - name: Build sysroot
        env:
          WORK_DIR: ${{ github.workspace }}/.work/${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build-sysroot.sh
          scripts/build-sysroot.sh "${{ matrix.target }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: .work/${{ matrix.target }}/dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs:
      - detect
      - build
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find release-assets -type f -name '*.tar.gz' -exec cp {} dist/ \;
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Delete existing release before force rebuild
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_rebuild == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete "${{ needs.detect.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --cleanup-tag \
            --yes || true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          name: VS Code ${{ needs.detect.outputs.vscode_version }} sysroots
          generate_release_notes: false
          make_latest: false
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          body: |
            Sysroot release for VS Code `${{ needs.detect.outputs.vscode_version }}`.

            Assets in this release are intended for the older-glibc Remote-SSH workaround described in `vscode-remote-faq.md`.

            Included targets:
            - `x86_64-linux-gnu-glibc-2.28-gcc-10.5.0.tar.gz`
            - `aarch64-linux-gnu-glibc-2.28-gcc-10.5.0.tar.gz`

            Remote host prerequisites:
            - `patchelf >= 0.18`
            - `VSCODE_SERVER_CUSTOM_GLIBC_LINKER`
            - `VSCODE_SERVER_CUSTOM_GLIBC_PATH`
            - `VSCODE_SERVER_PATCHELF_PATH`
